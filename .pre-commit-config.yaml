repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - typer>=0.12
          - structlog>=24.1
        args: [--strict]
        pass_filenames: false
        entry: mypy src/
