name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow publish.yml to invoke CI as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Verify lock file
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: mypy strict
        run: uv run mypy src/

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Bandit scan
        run: uv run bandit -r src/sovyx/ --configfile pyproject.toml

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: TypeScript check
        working-directory: dashboard
        run: npx tsc -b tsconfig.app.json
      - name: Run tests
        working-directory: dashboard
        run: npx vitest run
      - name: Build production bundle
        working-directory: dashboard
        run: npm run build
      - name: Verify static output
        run: |
          test -f src/sovyx/dashboard/static/index.html
          echo "✓ Static assets built successfully"

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: sovyx-4core
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --dev --frozen --python ${{ matrix.python-version }}
          uv pip install --python ${{ matrix.python-version }} "ddgs>=9.0" "trafilatura>=2.0"
      - name: Run tests
        env:
          PYTHONFAULTHANDLER: "1"
          PYTHONHASHSEED: "0"
        run: >
          uv run python -m pytest tests/
          --ignore=tests/smoke
          --timeout=15
          -q
          --no-header
          -p no:randomly
          -n 4
          --dist loadfile
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
