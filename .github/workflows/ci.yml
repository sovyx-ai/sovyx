name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow publish.yml to invoke CI as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Verify lock file
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: mypy strict
        run: uv run mypy src/

  security:
    name: Security (bandit)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Bandit scan
        run: uv run bandit -r src/sovyx/ --configfile pyproject.toml

  dashboard:
    name: Dashboard Build
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: TypeScript check
        working-directory: dashboard
        run: npx tsc -b tsconfig.app.json
      - name: Run tests
        working-directory: dashboard
        run: npx vitest run
      - name: Build production bundle
        working-directory: dashboard
        run: npm run build
      - name: Verify static output
        run: |
          test -f src/sovyx/dashboard/static/index.html
          echo "✓ Static assets built successfully"

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: sovyx-4core
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --dev --frozen --python ${{ matrix.python-version }}
          uv pip install --python ${{ matrix.python-version }} "ddgs>=9.0" "trafilatura>=2.0"
      - name: Run tests with coverage
        shell: bash
        run: |
          set +e
          LOG=/tmp/pytest.log
          # Wrap pytest with shell timeout: process hangs ~20min after summary on
          # CI due to non-daemon threads / async cleanup not releasing the event
          # loop. If the summary prints cleanly, we trust pytest's result and kill
          # any lingering hang. Failing tests (summary with "N failed") still fail
          # the job — only the post-summary hang is ignored.
          timeout --kill-after=30s 600s \
            uv run python -m pytest tests/ --ignore=tests/smoke --timeout=30 -v \
            2>&1 | tee "$LOG"

          if grep -qE '^=+ .*[0-9]+ failed' "$LOG"; then
            echo "::error::one or more tests failed"
            exit 1
          fi

          if grep -qE '^=+ .*[0-9]+ passed.* in [0-9.]+s' "$LOG"; then
            exit 0
          fi

          echo "::error::pytest did not produce a summary; run likely hung before tests completed"
          exit 1
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  schema-gate:
    name: Log Schema Gate
    runs-on: sovyx-4core
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Validate log schema catalog
        run: uv run python scripts/check_log_schemas.py

  exception-chain-gate:
    name: Exception Chain Gate
    runs-on: sovyx-4core
    needs: schema-gate
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Enforce explicit exception cause chains (PEP 3134)
        run: uv run python scripts/check_exception_chains.py

  pii-leak-gate:
    name: PII Leak Gate
    runs-on: sovyx-4core
    needs: exception-chain-gate
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Assert no raw PII leaks past the redactor (§22.3)
        run: uv run python scripts/check_test_pii.py