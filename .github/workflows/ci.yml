name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow publish.yml to invoke CI as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Verify lock file
        run: uv lock --check
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: mypy strict
        run: uv run mypy src/

  security:
    name: Security (bandit)
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Bandit scan
        run: uv run bandit -r src/sovyx/ --configfile pyproject.toml

  dashboard:
    name: Dashboard Build
    runs-on: sovyx-4core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: TypeScript check
        working-directory: dashboard
        run: npx tsc -b tsconfig.app.json
      - name: Run tests
        working-directory: dashboard
        run: npx vitest run
      - name: Build production bundle
        working-directory: dashboard
        run: npm run build
      - name: Verify static output
        run: |
          test -f src/sovyx/dashboard/static/index.html
          echo "✓ Static assets built successfully"

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Mission H3 v0.49.13 — bumped 25 → 35 after Phase 1.B v0.49.11 ran
    # the Windows-latest cell to 25m25s timeout on a clean test suite
    # (~16,250 tests). Local Windows runs the full suite in ~11 min, but
    # GitHub Actions Windows runners regularly add 50-80 % wall-clock
    # overhead vs local on Python test suites of this size. With Phase
    # 1.B + 1.C + 1.D adding ~50 new tests, the typical CI Windows wall
    # clock landed within ~22-24 min on green runs and crossed 25 m on
    # GHA-contended runs. 35 m gives Windows a 50 % headroom over the
    # observed worst-case while keeping Linux + macOS unaffected (those
    # cells finish in 8-10 min). Sibling of CLAUDE.md anti-pattern #22
    # (Windows timing noise) at the CI level.
    timeout-minutes: 35
    # windows-latest AND macos-latest are ADVISORY (continue-on-error), NOT
    # release-blocking gates. Both GitHub-hosted legs have repeatedly
    # surfaced hosted-runner-ONLY failures that blocked legitimate releases
    # passing on every other leg. The canonical runner is sovyx-4core
    # (3.11 + 3.12); it and all discipline gates remain HARD gates. Both
    # advisory legs still RUN for signal/visibility (a genuine platform
    # regression stays visible here, just non-blocking); remove an OS from
    # the expression to re-block it if that platform becomes
    # release-critical.
    #
    # windows-latest demoted v0.49.54 (2026-06-01): asyncio "Event loop is
    # closed" teardown + tight wall-clock perf bounds (Debugging Rule #12 /
    # anti-patterns #22, #30).
    #
    # macos-latest demoted 2026-07-02 (post-v0.49.59): nondeterministic
    # NATIVE segfault — faulthandler showed the crashing thread with
    # "<no Python frame>" (CoreAudio/PortAudio-layer background thread on a
    # hardware-less runner) while the main thread was in pure-Python FastAPI
    # route registration; the IDENTICAL tree had passed the publish macOS
    # leg 16 minutes earlier. Surfaced on the macos-26-arm64 images
    # (macos-latest label migrating to macOS 26 since 2026-06-15). Cannot be
    # root-caused without Mac hardware (same block as mission W4.1); flip
    # back to hard once a Mac is available and the segfault class is fixed.
    # (Earlier macOS history: one soft-launch run surfaced 24 test-side
    # failures, fixed in ebf0baf/8af0d03.)
    continue-on-error: ${{ matrix.os == 'windows-latest' || matrix.os == 'macos-latest' }}
    strategy:
      # See every failing cell in one run — with strict fail-fast a Linux
      # flake would hide a real Windows/macOS regression. Affordable
      # because the matrix is 4 cells, not 20.
      fail-fast: false
      matrix:
        include:
          - os: sovyx-4core
            python-version: "3.11"
          - os: sovyx-4core
            python-version: "3.12"
          # Windows + macOS on Python 3.12 only. 3.11 coverage on
          # non-Linux adds marginal signal over 3.12 (stdlib differences
          # are platform-agnostic; the cross-platform risk surface is in
          # OS ↔ library interaction, not Python-version). Expand to 3.11
          # on Win/Mac if a 3.11-only regression ever slips through.
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      # Install the PortAudio C library on Linux + macOS runners. The
      # voice-extra ``sounddevice`` Python package imports cleanly
      # without it, but its module init looks up libportaudio2 at
      # load time and raises ``OSError: PortAudio library not found``
      # when the C lib is absent. Production code in
      # ``voice/pipeline/_output_queue.py::_play_audio`` catches that
      # OSError as the headless-test fallback, but tests that exercise
      # device enumeration / probe paths invoke sounddevice through
      # paths that don't share that guard. Install the system C lib
      # so every voice-related code path on Linux + macOS CI behaves
      # the same as on Windows runners (where the wheel bundles
      # PortAudio).
      - name: Install PortAudio (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libportaudio2
      - name: Install PortAudio (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install portaudio
      # macOS-default bash is Apple's GPL-2 fork pinned at 3.2 (1995-era
      # syntax). The Sovyx voice-diag bash toolkit (``common.sh``)
      # uses ``mapfile`` (bash 4+); ``_runner.py:_check_prerequisites``
      # already raises ``DiagPrerequisiteError`` at runtime when
      # ``bash --version`` reports < 4. Install Homebrew bash 5+ on
      # macOS CI so the same guarantee holds in tests + the bash-
      # specific test suite (``test_bash_only_flag.py``) actually
      # runs and validates the contract on macOS instead of being
      # skipped. ``brew install bash`` puts ``/opt/homebrew/bin/bash``
      # on the PATH ahead of ``/bin/bash`` so ``shutil.which("bash")``
      # in tests resolves to the new one.
      - name: Install bash 4+ (macOS default is 3.2)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install bash
      - uses: ./.github/actions/setup-sovyx-python
        with:
          python-version: ${{ matrix.python-version }}
          install-extras: uv pip install --python ${{ matrix.python-version }} "ddgs>=9.0" "trafilatura>=2.0"
      - name: Run tests with coverage
        shell: bash
        run: |
          set +e
          # ``RUNNER_TEMP`` is GitHub-provided on every OS and points at a
          # writable, platform-appropriate temp dir (``/home/runner/_temp``
          # on Linux, ``/Users/runner/work/_temp`` on macOS, ``D:\a\_temp``
          # on Windows). ``/tmp`` would break the Windows cell.
          LOG="${RUNNER_TEMP}/pytest.log"

          # ``pytest --timeout=30`` caps per-test runtime; the job's
          # ``timeout-minutes: 25`` caps wall-clock. Together they replace
          # the GNU ``timeout`` wrapper the previous ci.yml used — GNU
          # timeout isn't available on Windows Git Bash nor default macOS,
          # and the specific post-summary hang it worked around was a
          # sovyx-4core runner quirk, not a pytest quirk.
          uv run python -m pytest tests/ --ignore=tests/smoke --timeout=30 -v 2>&1 | tee "$LOG"

          if grep -qE '^=+ .*[0-9]+ failed' "$LOG"; then
            echo "::error::one or more tests failed"
            exit 1
          fi

          if grep -qE '^=+ .*[0-9]+ passed.* in [0-9.]+s' "$LOG"; then
            exit 0
          fi

          echo "::error::pytest did not produce a summary; run likely hung before tests completed"
          exit 1
      - name: Upload coverage
        # Only the Ubuntu × 3.12 cell uploads. Otherwise the four cells
        # would race to upload the same artifact name and the last writer
        # would win non-deterministically.
        if: matrix.os == 'sovyx-4core' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  schema-gate:
    name: Log Schema Gate
    runs-on: sovyx-4core
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Validate log schema catalog
        run: uv run python scripts/check_log_schemas.py

  exception-chain-gate:
    name: Exception Chain Gate
    runs-on: sovyx-4core
    needs: schema-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Enforce explicit exception cause chains (PEP 3134)
        run: uv run python scripts/check_exception_chains.py

  constant-time-token-gate:
    name: Constant-Time Token Gate
    runs-on: sovyx-4core
    needs: exception-chain-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Refuse variable-time WS token compares (CWE-208 / F2-C02)
        run: uv run python scripts/check_constant_time_token.py

  pii-leak-gate:
    name: PII Leak Gate
    runs-on: sovyx-4core
    needs: constant-time-token-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Assert no raw PII leaks past the redactor (§22.3)
        run: uv run python scripts/check_test_pii.py

  otel-semconv-gate:
    name: OTel Semconv Gate
    runs-on: sovyx-4core
    needs: pii-leak-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Validate OTel resource attribute spelling (§22.6)
        run: uv run python scripts/check_otel_semconv.py

  metrics-cardinality-gate:
    name: Metrics Cardinality Gate
    runs-on: sovyx-4core
    needs: otel-semconv-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Refuse high-cardinality metric labels (§22.7)
        run: uv run python scripts/check_metrics_cardinality.py

  perf-regression-gate:
    name: Perf Regression Gate
    runs-on: sovyx-4core
    needs: metrics-cardinality-gate
    timeout-minutes: 10
    # CLAUDE.md anti-pattern #31 root-cause fix (2026-05-03,
    # extended 2026-05-20):
    # On tag pushes, both the standalone ``CI`` workflow (push to
    # main) and ``Publish to PyPI / CI Gate`` (workflow_call from
    # publish.yml on the matching tag push) fire near-simultaneously
    # on the same ``sovyx-4core`` self-hosted pool. When both perf
    # gates land on the same physical host the async benchmark gets
    # CPU-steal / context-switching from the parallel run, which
    # produces the bimodal async p99 distribution that even
    # median-of-5 cannot survive (3 of 5 runs noisy → median is the
    # 540 µs noisy sample → 3.19× ratio fails the 2.0× budget). The
    # ``perf-regression-gate-global`` concurrency group eliminates
    # the parallel-runs-on-same-host failure mode by serialising the
    # two workflow_call instances; ``cancel-in-progress: false`` so
    # BOTH runs still execute — the second runs against an idle host
    # after the first releases it.
    #
    # At v0.49.34 the gate flaked AGAIN despite the concurrency
    # group: third-party tenants on the GitHub-managed Larger Runner
    # host caused the same bimodal pattern. The paired second-layer
    # fix lives in ``scripts/check_perf_regression.py``
    # (``_DEFAULT_REPEATS`` 5 → 7 + ``statistics.median`` →
    # ``_trimmed_mean``, dropping the slowest AND fastest run before
    # averaging the inner five). Trimmed-mean-of-7 survives up to
    # two noisy runs without firing — the discrete next layer of
    # noise headroom obtainable without recalibrating the 2.0× /
    # 3.0× ratio budgets.
    concurrency:
      group: perf-regression-gate-global
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Assert observability hot-path latency within budget (§23)
        run: uv run python scripts/check_perf_regression.py --iterations 20000

  log-noise-gate:
    name: Log Noise Gate
    runs-on: sovyx-4core
    needs: perf-regression-gate
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Refuse silent log-volume regressions (§23.2)
        run: uv run python scripts/check_log_noise.py

  voice-bash-diag-smoke:
    # P7.T1 (mission MISSION-voice-calibration-extreme-audit-2026-05-06.md
    # §11.2 #20): real bash diag end-to-end smoke test on Linux.
    # Asserts the bundled toolkit + the async-native runner + the
    # in-process triage all complete without crashing on a clean
    # sovyx-4core runner. The gate is INTENTIONALLY non-strict on
    # tarball content — we only check that:
    #   * The diag exits 0 (no selftest failure / no bash error).
    #   * A result tarball lands in $HOME/sovyx-diag-*/.
    #   * The CLI's exit code is OK (which already wraps tarball
    #     existence + triage stability via the runner contract).
    # Uses ``--surgical`` (CLI flag → bash ``--only A,C,D,E,J
    # --skip-captures --skip-guardian --skip-operator-prompts``)
    # to cut runtime from 8-12 min interactive to ~30 s. The runner's
    # OS-gate already short-circuits non-Linux to
    # DiagPrerequisiteError, so this job is effectively Linux-only
    # by virtue of running on sovyx-4core (Ubuntu).
    name: Voice Bash Diag Smoke
    runs-on: sovyx-4core
    needs: log-noise-gate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-sovyx-python
      - name: Run bash diag end-to-end (surgical scope, no captures)
        run: |
          uv run sovyx doctor voice --full-diag --non-interactive --surgical
