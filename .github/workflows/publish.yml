name: Publish to PyPI

# Triggered only on version tags — never on branch pushes.
# This ensures every PyPI release maps 1:1 to a git tag.
on:
  push:
    tags:
      - "v*"

# Prevent concurrent publishes for the same tag
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: run full CI before publishing ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build distribution artifacts ──
  build:
    name: Build sdist + wheel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard assets
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Verify dashboard static output
        run: test -f src/sovyx/dashboard/static/index.html

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify dist contents
        run: |
          ls -la dist/
          # Ensure both sdist and wheel exist
          test -f dist/sovyx-${{ steps.version.outputs.VERSION }}.tar.gz
          test -f dist/sovyx-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
          echo "✓ Artifacts verified: sdist + wheel for v${{ steps.version.outputs.VERSION }}"

      - name: Verify wheel-internal dashboard bundle integrity
        # Mission C5 §T1.4 — STRICT post-build gate. Closes the v0.43.1
        # forensic gap where the existing `test -f index.html` step passed
        # while the wheel actually shipped with referenced chunks absent
        # on disk. Unpacks the freshly-built wheel and runs the Quality
        # Gate 11 checker against the wheel-internal static dir.
        run: |
          set -euo pipefail
          rm -rf /tmp/wheel-check
          mkdir -p /tmp/wheel-check
          python -m zipfile -e "dist/sovyx-${{ steps.version.outputs.VERSION }}-py3-none-any.whl" /tmp/wheel-check
          uv run python scripts/dev/check_dashboard_bundle_integrity.py \
              --static-dir /tmp/wheel-check/sovyx/dashboard/static
          echo "✓ Wheel-internal dashboard bundle integrity verified (Mission C5 §T1.4)"

      - name: Verify LLM provider wire-discipline
        # Mission C6 §T1.4 — STRICT post-build gate (publish path is bypass-proof
        # even while Gate 12 is LENIENT in scripts/verify_gates.sh until v0.50.0).
        # Closes the 5-surface drift class so a new 10th-or-Nth cloud provider
        # added to LLMProviderKey without parallel wiring in bootstrap.py +
        # onboarding.py + _default_model_for + locale i18n + docs cannot ship
        # silently. Runs against the repo tree (the registry + checker live in
        # the source tree; wheel-internal verify is N/A — wire-discipline is
        # always evaluated against the canonical registry, not the artifact).
        run: |
          set -euo pipefail
          uv run python scripts/dev/check_llm_provider_discipline.py
          echo "✓ LLM provider wire-discipline verified (Mission C6 §T1.4 STRICT)"

      - name: Verify platform-neutral event-name discipline
        # Mission H2 §T1.5 — REPORT post-build gate during the staged-adoption
        # window (Phase 1.A v0.49.6..Phase 1.D v0.49.9). Runs the AST scanner
        # against the repo tree (wheel-internal verify is N/A — event-name
        # discipline is always evaluated against the canonical source). The
        # scanner walks every `*.py` under `src/sovyx/` and reports
        # `logger.{info,warning,error,debug,critical}(...)` emits whose
        # event-name literal embeds a platform-specific token (apo, wasapi,
        # dsound, pulseaudio, pipewire, coreaudio, wmme, directshow,
        # voice_clarity, module_echo_cancel, voice_isolation) outside the
        # four permitted escape hatches: (a) sys.platform gate, (b)
        # platform-suffixed dotted-namespace, (c) inline `# h2-allowlist:`
        # comment, (d) file-level allowlist for the dual-emission wrapper.
        # Closes the canonical instance of CLAUDE.md anti-pattern #39(b)
        # revealed by the v0.43.1 forensic audit §H2. The post-build verify
        # is REPORT-only during v0.49.x staged adoption (matches Gate 13's
        # LENIENT shape in verify_gates.sh; surfaces the pre-mission baseline
        # of 31 violations without failing publish). Phase 3 v0.51.0 swaps
        # to `--strict` here AND in verify_gates.sh; legacy event-name
        # emissions dropped + remaining sites carry `# h2-allowlist:` comments
        # per anti-pattern #45 escape hatch (c).
        run: |
          set -euo pipefail
          uv run python scripts/dev/check_platform_neutral_event_names.py
          echo "✓ Platform-neutral event-name discipline reported (Mission H2 §T1.5)"

      - name: Verify quarantine reason discipline
        # Mission H3 §T1.4 — REPORT post-build gate during staged adoption
        # (Phase 1.A v0.49.10 .. Phase 1.D v0.49.13). Runs the AST scanner
        # against the repo tree. The scanner walks every `*.py` under
        # `src/sovyx/` and reports any `*.add(reason=<literal>)` call site
        # outside the four compliant shapes: (a) QuarantineReason enum
        # member, (b) resolve_reason_from_verdict / _diagnosis SSoT
        # resolver, (c) field passthrough (.reason / .derived_reason /
        # .resolved_reason), (d) lifecycle-tag literal with explicit
        # `# h3-allowlist:` inline comment. Closes the canonical instance
        # of CLAUDE.md anti-pattern #39(a) output side revealed by the
        # v0.43.1 forensic audit §H3. The post-build verify is REPORT-only
        # during v0.49.10..v0.52.x staged adoption (matches Gate 14's
        # LENIENT shape in verify_gates.sh). Phase 3 v0.53.0 swaps to
        # `--strict` here AND in verify_gates.sh; legacy literal default
        # at `capture_integrity.py:1264` is rewritten + remaining lifecycle
        # tags carry `# h3-allowlist:` comments per anti-pattern #46
        # escape hatch (d).
        run: |
          set -euo pipefail
          uv run python scripts/dev/check_quarantine_reason_discipline.py
          echo "✓ Quarantine reason discipline reported (Mission H3 §T1.4)"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ── Publish to PyPI ──
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/project/sovyx/${{ needs.build.outputs.VERSION || '' }}/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/sovyx/settings/publishing/
        # Trusted publisher: GitHub Actions, repo sovyx-ai/sovyx,
        # workflow publish.yml, environment pypi

  # ── Create GitHub Release ──
  release:
    name: GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
