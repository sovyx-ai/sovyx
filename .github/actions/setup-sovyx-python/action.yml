name: Setup Sovyx Python env
description: >
  Install uv + sync dev deps — shared across every Python gate in ci.yml.
  Consolidates the setup-uv / uv-python / uv-sync sequence that used to
  repeat in 9 jobs. Bumping ``setup-uv`` or changing the ``uv sync``
  flags now happens in exactly one place.

  IMPORTANT: this is a LOCAL composite action (``uses: ./.github/...``).
  GitHub must locate ``action.yml`` on disk before the action runs, which
  means ``actions/checkout@v4`` MUST be the first step of every job that
  uses this action — the checkout step cannot live inside the composite
  itself. That's the chicken-and-egg bootstrap rule for local actions:
  the workflow interpreter reads the action file before any step of the
  action runs, so a checkout inside the composite would need the file it
  hasn't checked out yet.

inputs:
  python-version:
    description: >
      Python version to install (e.g. "3.11", "3.12"). Empty string skips
      the explicit install and uses whatever uv resolves from the lock file
      (current default: the highest version in ``requires-python``).
    required: false
    default: ""
  install-extras:
    description: >
      Extra pip-install command to run after ``uv sync`` (used by the test
      job to add pre-release deps like ``ddgs``/``trafilatura`` that aren't
      in the dev group). Empty string skips.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install Python ${{ inputs.python-version }}
      if: inputs.python-version != ''
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: uv sync --dev --frozen
      shell: bash
      run: |
        if [ -n "${{ inputs.python-version }}" ]; then
          uv sync --dev --frozen --python ${{ inputs.python-version }}
        else
          uv sync --dev --frozen
        fi

    - name: Install extras
      if: inputs.install-extras != ''
      shell: bash
      run: ${{ inputs.install-extras }}
