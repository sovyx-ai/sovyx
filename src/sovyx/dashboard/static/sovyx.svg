<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep purple to near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1033"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <!-- S gradient: vivid violet spectrum -->
    <linearGradient id="sg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Subtle glow behind the S -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Thin border accent -->
  <rect x="4" y="4" width="504" height="504" rx="104" ry="104" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.2"/>
  <!-- S letterform — scaled and centered from the official logo -->
  <g transform="translate(148, 96) scale(4)" filter="url(#glow)">
    <path fill="url(#sg)" d="M48 8L6 8Q3 8 3 11L3 37Q3 40 6 40L45 40Q48 40 48 43L48 69Q48 72 45 72L6 72Q3 72 3 69L3 61L34 61Q37 61 37 58L37 43Q37 40 34 40L17 40Q14 40 14 37L14 22Q14 19 17 19L48 19Z"/>
  </g>
</svg>
