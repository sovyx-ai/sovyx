site_name: Sovyx
site_description: The AI Mind That Remembers You
site_url: https://docs.sovyx.ai
repo_url: https://github.com/sovyx-ai/sovyx
repo_name: sovyx-ai/sovyx

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - API Reference: api-reference.md
  - LLM Router: llm-router.md
  - Security: security.md
  - Modules:
    - Engine: modules/engine.md
    - Cognitive: modules/cognitive.md
    - Brain: modules/brain.md
    - Persistence: modules/persistence.md
    - Observability: modules/observability.md
    - LLM: modules/llm.md
    - Mind: modules/mind.md
    - Context: modules/context.md
    - Bridge: modules/bridge.md
    - CLI: modules/cli.md
    - Dashboard: modules/dashboard.md
    - Plugins: modules/plugins.md
    - Upgrade: modules/upgrade.md
    - Voice: modules/voice.md
    - Voice device test: modules/voice-device-test.md
    - Licensing: modules/licensing.md
    - Benchmarks: modules/benchmarks.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sovyx-ai/sovyx

copyright: Copyright &copy; 2026 Sovyx AI — AGPL-3.0
